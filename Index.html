<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Heart Orbit</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    height:100%;
    overflow:hidden;
    touch-action:none;
}

body{
    background: radial-gradient(circle at top, #1a0026 0%, #000000 70%);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
}

/* GIFT SCREEN */
#giftScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle, #2a0033, #000);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

.giftBox{
    font-size:100px;
    cursor:pointer;
    animation:float 2s infinite ease-in-out;
    text-shadow:0 0 20px #ff4f9a;
}

.giftText{
    margin-top:15px;
    color:white;
    font-size:22px;
    text-shadow:0 0 10px #ff4f9a;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

/* ORIGINAL STYLE */
.heart-container{
    position:absolute;
    width:900px;
    height:800px;
    transform-origin:center center;
}

.glow{
    position:absolute;
    width:550px;
    height:550px;
    background:radial-gradient(circle,
    rgba(255,0,100,0.35),
    transparent 70%);
    border-radius:50%;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

.center-image{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:300px;
    height:300px;
    object-fit:cover;
    clip-path: polygon(
        50% 15%,61% 5%,75% 5%,88% 15%,95% 35%,
        80% 65%,50% 95%,20% 65%,5% 35%,12% 15%,25% 5%,39% 5%
    );
    border:4px solid #ff4f9a;
    box-shadow:0 0 25px #ff4f9a;
    z-index:50;
    cursor:pointer;
}

.center-text{
    position:absolute;
    top:28%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:52px;
    font-weight:bold;
    text-align:center;
    z-index:10;
    text-shadow:0 0 20px #ff3366;
    white-space:nowrap;
}

.heart-img{
    width:35px;
    height:35px;
    object-fit:cover;
    border-radius:8px;
    box-shadow:0 0 10px #ff4f9a;
    cursor:pointer;
}

.love-label{
    position:absolute;
    font-size:10px;
    color:#ff4f9a;
    font-weight:bold;
    text-shadow:0 0 8px #ff4f9a;
    white-space:nowrap;
    pointer-events:none;
}

.flower{
    position:absolute;
    color:#ff7eb6;
    pointer-events:none;
    animation:twinkle linear infinite;
    text-shadow:0 0 10px #ff4f9a;
}

@keyframes twinkle{
    0%{ opacity:0.3; transform:translateY(0) scale(0.8); }
    50%{ opacity:1; transform:translateY(-10px) scale(1.2); }
    100%{ opacity:0.3; transform:translateY(0) scale(0.8); }
}

@keyframes orbitMove{
    0%{ transform: translate(0px, 0px) scale(0.9); }
    50%{ transform: translate(-3px, 4px) scale(1.1); }
    100%{ transform: translate(0px, 0px) scale(0.9); }
}

.modal{
    display:none;
    position:fixed;
    z-index:999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#1a001f;
    padding:30px;
    border-radius:15px;
    width:80%;
    max-width:500px;
    color:white;
    text-align:center;
    box-shadow:0 0 25px #ff4f9a;
}

#closeBtn{
    float:right;
    font-size:30px;
    cursor:pointer;
    color:#ff4f9a;
}

.viewer{
    display:none;
    position:fixed;
    z-index:9999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
}

.viewer img{
    max-width:90%;
    max-height:90%;
    border-radius:12px;
    box-shadow:0 0 30px #ff4f9a;
}

#viewerClose{
    position:absolute;
    top:20px;
    right:30px;
    font-size:40px;
    color:#ff4f9a;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- GIFT SCREEN -->
<div id="giftScreen">
    <div class="giftBox" id="openGift">🎁</div>
    <div class="giftText">CLICK ME</div>
</div>

<div class="heart-container" id="heart">
    <div class="glow"></div>
    <img class="center-image" src="grad.jpg" id="heartImage">
    <div class="center-text">Happy Birthday Inay</div>
</div>

<!-- AUDIO -->
<audio id="bgMusic" src="mess.mp3"></audio>
<audio id="dbMusic" src="bd.mp3"></audio>

<!-- MODAL -->
<div id="letterModal" class="modal">
    <div class="modal-content">
        <span id="closeBtn">&times;</span>
        <h1>💖 Happy Birthday 💖</h1>
        <p>
            Mahal na Mahal kita Inay.<br><br>
            Salamat sa lahat ng sakripisyo mo.<br>
            Wala kaming kapalit sa pagmamahal mo.<br><br>
            Happy Birthday! 🎉🎂💐
        </p>
    </div>
</div>

<!-- VIEWER -->
<div id="viewer" class="viewer">
    <span id="viewerClose">&times;</span>
    <img id="viewerImg">
</div>

<script>

const heart = document.getElementById("heart");
const giftScreen = document.getElementById("giftScreen");

const music = document.getElementById("bgMusic");
const dbMusic = document.getElementById("dbMusic");

/* OPEN GIFT */
document.getElementById("openGift").addEventListener("click", () => {
    giftScreen.style.display = "none";

    dbMusic.currentTime = 5;
    dbMusic.play().catch(err => console.log(err));
});

/* HEART ORBIT */
let i = 1;

for(let t = 0; t < Math.PI * 2 && i <= 100; t += 0.07, i++){

    let x = 16 * Math.pow(Math.sin(t), 3);
    let y =
        13 * Math.cos(t)
        - 5 * Math.cos(2 * t)
        - 2 * Math.cos(3 * t)
        - Math.cos(4 * t);

    x *= 22;
    y *= 22;

    const wrapper = document.createElement("div");
    wrapper.style.position = "absolute";
    wrapper.style.left = `${x + 430}px`;
    wrapper.style.top = `${-y + 300}px`;
    wrapper.style.animation = "orbitMove 6s ease-in-out infinite";

    const img = document.createElement("img");
    img.src = `${i}.jpg`;
    img.className = "heart-img";

    img.addEventListener("click", function(){
        document.getElementById("viewer").style.display = "flex";
        document.getElementById("viewerImg").src = this.src;
    });

    const label = document.createElement("div");
    label.className = "love-label";
    label.innerText = "I love you 💖";
    label.style.left = "40px";

    wrapper.appendChild(img);
    wrapper.appendChild(label);
    heart.appendChild(wrapper);
}

/* FLOWERS */
const flowers = ["✿","❀","🌸","🌺","💮","🌼"];

for(let i = 0; i < 120; i++){
    const flower = document.createElement("div");
    flower.className = "flower";
    flower.innerText = flowers[Math.floor(Math.random()*flowers.length)];
    flower.style.left = Math.random() * window.innerWidth + "px";
    flower.style.top = Math.random() * window.innerHeight + "px";
    flower.style.fontSize = (10 + Math.random()*20) + "px";
    flower.style.animationDuration = (2 + Math.random()*5) + "s";
    document.body.appendChild(flower);
}

/* MODAL OPEN */
document.getElementById("heartImage")
.addEventListener("click", () => {
    document.getElementById("letterModal").style.display = "flex";

    // STOP bd.mp3 when opening message
    dbMusic.pause();

    music.currentTime = 225;
    music.play().catch(()=>{});
});

/* MODAL CLOSE */
document.getElementById("closeBtn")
.addEventListener("click", () => {
    document.getElementById("letterModal").style.display = "none";

    // RESUME bd.mp3 when closing message
    dbMusic.play().catch(()=>{});

    music.pause();
});

/* VIEWER */
document.getElementById("viewerClose")
.addEventListener("click", () => {
    document.getElementById("viewer").style.display = "none";
});

document.getElementById("viewer")
.addEventListener("click", (e) => {
    if(e.target.id === "viewer"){
        document.getElementById("viewer").style.display = "none";
    }
});

/* RESIZE */
function resizeStage(){
    const container = document.querySelector(".heart-container");

    const baseWidth = 900;
    const baseHeight = 800;

    let scaleX = window.innerWidth / baseWidth;
    let scaleY = window.innerHeight / baseHeight;

    let scale = Math.min(scaleX, scaleY) * 0.9;

    if(window.innerWidth < 768){
        scale *= 0.88;
    }

    container.style.left = "50%";
    container.style.top = "50%";
    container.style.transform = `translate(-50%, -50%) scale(${scale})`;
}

window.addEventListener("resize", resizeStage);
window.addEventListener("load", resizeStage);

</script>

</body>
</html>
